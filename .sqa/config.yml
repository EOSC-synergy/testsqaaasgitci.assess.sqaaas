        - /usr/bin/env sh .sqa/script.clove_compassionate_orangutan.sh
        container: qc.doc_wisteria_artistic_wolf
      gitlab.com/PalomoIFCA/testsqaaasgitci git:
        commands:
        - /usr/bin/env sh .sqa/script.zinnia_warm_gull.sh
        container: qc.doc_rose_open_narwhal
      gitlab.com/PalomoIFCA/testsqaaasgitci markdownlint:
        commands:
        - /usr/bin/env sh .sqa/script.cream_tolerant_viper.sh
        container: qc.doc_crimson_playful_uakari
